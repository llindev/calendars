name: Generate Calendars

on:
  # Run on every push to main
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "generate.py"
      - "requirements.txt"

  # Run on a schedule – regenerate every day at 02:00 UTC
  schedule:
    - cron: "0 2 * * *"

  # Allow manual triggering from the GitHub UI
  workflow_dispatch:

permissions:
  contents: write  # needed to commit generated .ics files back to the repo

# Prevent concurrent runs from racing to push to main at the same time.
# cancel-in-progress: false ensures an in-flight commit+push is never
# interrupted; the next queued run will see no changes and exit cleanly.
concurrency:
  group: generate-calendars
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate calendars
        run: python generate.py

      - name: Commit and push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate calendars [skip ci]"
            # Rebase on top of any commits that landed while this job was
            # running, then push. HEAD:main works regardless of local branch name.
            git pull --rebase origin main
            git push origin HEAD:main
          fi
